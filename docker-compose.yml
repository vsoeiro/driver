x-backend-common: &backend-common
  env_file:
    - .env
  environment: &backend-env
    REDIS_URL: redis://redis:6379/0
    COMIC_RAR_TOOLS_DIR: /app/.tools
    DB_POOL_MODE: "null"
  extra_hosts:
    - "host.docker.internal:host-gateway"
  volumes:
    - upload_tmp:/tmp/onedrive_uploads
  restart: unless-stopped

x-backend-runtime-depends: &backend-runtime-depends
  migrate:
    condition: service_completed_successfully
  redis:
    condition: service_healthy

services:
  migrate:
    <<: *backend-common
    image: onedrive-cbr-backend:local
    build:
      context: ./src
      dockerfile: backend/Dockerfile
      target: backend-runtime
    container_name: driver-migrate
    command: uv run --no-sync alembic upgrade head
    restart: "no"

  backend:
    <<: *backend-common
    image: onedrive-cbr-backend:local
    build:
      context: ./src
      dockerfile: backend/Dockerfile
      target: backend-runtime
    container_name: driver-backend
    command: uv run --no-sync uvicorn backend.main:app --host 0.0.0.0 --port 8000
    depends_on: *backend-runtime-depends
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s
    ports:
      - "8000:8000"

  worker-light:
    <<: *backend-common
    image: onedrive-cbr-backend:local
    container_name: driver-worker-light
    environment:
      <<: *backend-env
      WORKER_QUEUE_NAME: driver:jobs:light
      WORKER_CONCURRENCY: 3
    command: uv run --no-sync arq backend.workers.arq_worker.WorkerSettings
    depends_on: *backend-runtime-depends

  worker-default:
    <<: *backend-common
    image: onedrive-cbr-backend:local
    container_name: driver-worker-default
    environment:
      <<: *backend-env
      WORKER_QUEUE_NAME: driver:jobs
      WORKER_CONCURRENCY: 2
    command: uv run --no-sync arq backend.workers.arq_worker.WorkerSettings
    depends_on: *backend-runtime-depends

  worker-heavy:
    <<: *backend-common
    image: onedrive-cbr-backend:local
    container_name: driver-worker-heavy
    environment:
      <<: *backend-env
      WORKER_QUEUE_NAME: driver:jobs:heavy
      WORKER_CONCURRENCY: 1
    command: uv run --no-sync arq backend.workers.arq_worker.WorkerSettings
    depends_on: *backend-runtime-depends

  worker-vision:
    <<: *backend-common
    image: onedrive-cbr-backend-vision:local
    build:
      context: ./src
      dockerfile: backend/Dockerfile
      target: backend-vision-runtime
    container_name: driver-worker-vision
    profiles:
      - vision
    environment:
      <<: *backend-env
      WORKER_QUEUE_NAME: driver:jobs:vision
      WORKER_CONCURRENCY: 1
      WORKER_ENABLE_IMAGE_HANDLERS: "true"
    command: uv run --no-sync arq backend.workers.arq_worker.WorkerSettings
    depends_on: *backend-runtime-depends

  redis:
    image: redis:7-alpine
    container_name: onedrive-cbr-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  frontend:
    image: onedrive-cbr-frontend:local
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    container_name: driver-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"
    restart: unless-stopped

volumes:
  upload_tmp:
