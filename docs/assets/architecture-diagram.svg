<svg width="1280" height="760" viewBox="0 0 1280 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#EFF6FF"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1D4ED8"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1280" height="760" fill="url(#bg)"/>

  <text x="60" y="70" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="42" font-weight="700" fill="url(#title)">
    Driver Architecture
  </text>
  <text x="60" y="104" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="18" fill="#334155">
    Queue-driven cloud file operations with optional comics module
  </text>

  <!-- Frontend -->
  <g filter="url(#shadow)">
    <rect x="70" y="170" width="260" height="140" rx="18" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="2"/>
  </g>
  <text x="100" y="218" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#0F172A">Frontend</text>
  <text x="100" y="248" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="18" fill="#334155">React + Vite</text>
  <text x="100" y="274" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="16" fill="#64748B">Dashboard, File Library, Jobs, Admin</text>

  <!-- API -->
  <g filter="url(#shadow)">
    <rect x="420" y="150" width="360" height="180" rx="20" fill="#FFFFFF" stroke="#93C5FD" stroke-width="2"/>
  </g>
  <text x="450" y="205" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#0F172A">Backend API</text>
  <text x="450" y="238" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="20" fill="#334155">FastAPI + SQLAlchemy + Alembic</text>
  <text x="450" y="267" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="16" fill="#64748B">Auth, Items, Metadata, Rules, Jobs</text>
  <text x="450" y="293" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="16" fill="#64748B">Routes jobs to light/default/heavy queues</text>

  <!-- Redis -->
  <g filter="url(#shadow)">
    <rect x="430" y="385" width="340" height="150" rx="20" fill="#FFFFFF" stroke="#FCA5A5" stroke-width="2"/>
  </g>
  <text x="460" y="435" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#7F1D1D">Redis Queue</text>
  <text x="460" y="468" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="18" fill="#991B1B">driver:jobs:light</text>
  <text x="460" y="492" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="18" fill="#991B1B">driver:jobs</text>
  <text x="460" y="516" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="18" fill="#991B1B">driver:jobs:heavy</text>

  <!-- Workers -->
  <g filter="url(#shadow)">
    <rect x="860" y="120" width="340" height="220" rx="20" fill="#FFFFFF" stroke="#A7F3D0" stroke-width="2"/>
  </g>
  <text x="890" y="172" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#064E3B">ARQ Workers</text>
  <text x="890" y="205" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="18" fill="#065F46">light  -> short/frequent jobs</text>
  <text x="890" y="232" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="18" fill="#065F46">default -> medium jobs</text>
  <text x="890" y="259" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="18" fill="#065F46">heavy -> long/costly jobs</text>
  <text x="890" y="289" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="16" fill="#166534">Retry policy + dedupe aware</text>

  <!-- Database -->
  <g filter="url(#shadow)">
    <rect x="850" y="410" width="190" height="130" rx="18" fill="#FFFFFF" stroke="#C4B5FD" stroke-width="2"/>
  </g>
  <text x="878" y="462" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#4C1D95">PostgreSQL</text>
  <text x="878" y="488" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="16" fill="#6D28D9">Accounts</text>
  <text x="878" y="510" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="16" fill="#6D28D9">Items / Metadata / Jobs</text>

  <!-- Providers -->
  <g filter="url(#shadow)">
    <rect x="1080" y="410" width="140" height="130" rx="18" fill="#FFFFFF" stroke="#FDE68A" stroke-width="2"/>
  </g>
  <text x="1104" y="455" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#78350F">Cloud APIs</text>
  <text x="1104" y="483" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="16" fill="#92400E">Microsoft</text>
  <text x="1104" y="505" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="16" fill="#92400E">Google</text>

  <!-- Optional comics -->
  <g filter="url(#shadow)">
    <rect x="860" y="575" width="360" height="110" rx="18" fill="#FFFFFF" stroke="#67E8F9" stroke-width="2"/>
  </g>
  <text x="892" y="620" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#0C4A6E">Optional Comics Module (Extra)</text>
  <text x="892" y="648" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="16" fill="#0369A1">
    Cover extraction, metadata mapping, and library manager workflows
  </text>

  <!-- arrows -->
  <line x1="330" y1="230" x2="410" y2="230" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="600" y1="330" x2="600" y2="372" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="780" y1="230" x2="850" y2="230" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="770" y1="460" x2="850" y2="475" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="1040" y1="475" x2="1072" y2="475" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="1030" y1="542" x2="1030" y2="568" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- footer note -->
  <text x="60" y="724" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="14" fill="#64748B">
    Note: queue names and worker concurrency are configurable via environment variables.
  </text>
</svg>
