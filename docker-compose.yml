services:
  backend:
    image: onedrive-cbr-backend:local
    build:
      context: ./src
      dockerfile: backend/Dockerfile
      args:
        UV_SYNC_ARGS: ""
    container_name: driver-backend
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      COMIC_RAR_TOOLS_DIR: /app/.tools
      DB_POOL_SIZE: 12
      DB_MAX_OVERFLOW: 8
    command: >
      sh -c "uv run --no-sync alembic upgrade head &&
             uv run --no-sync uvicorn backend.main:app --host 0.0.0.0 --port 8000"
    depends_on:
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    volumes:
      - upload_tmp:/tmp/onedrive_uploads
    restart: unless-stopped

  worker-light:
    image: onedrive-cbr-backend:local
    container_name: driver-worker-light
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      COMIC_RAR_TOOLS_DIR: /app/.tools
      WORKER_QUEUE_NAME: driver:jobs:light
      WORKER_CONCURRENCY: 8
      DB_POOL_SIZE: 12
      DB_MAX_OVERFLOW: 8
    command: uv run --no-sync arq backend.workers.arq_worker.WorkerSettings
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - upload_tmp:/tmp/onedrive_uploads
    restart: unless-stopped

  worker-default:
    image: onedrive-cbr-backend:local
    container_name: driver-worker-default
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      COMIC_RAR_TOOLS_DIR: /app/.tools
      WORKER_QUEUE_NAME: driver:jobs
      WORKER_CONCURRENCY: 3
      DB_POOL_SIZE: 8
      DB_MAX_OVERFLOW: 4
    command: uv run --no-sync arq backend.workers.arq_worker.WorkerSettings
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - upload_tmp:/tmp/onedrive_uploads
    restart: unless-stopped

  worker-heavy:
    image: onedrive-cbr-backend:local
    container_name: driver-worker-heavy
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      COMIC_RAR_TOOLS_DIR: /app/.tools
      WORKER_QUEUE_NAME: driver:jobs:heavy
      WORKER_CONCURRENCY: 1
      DB_POOL_SIZE: 4
      DB_MAX_OVERFLOW: 2
    command: uv run --no-sync arq backend.workers.arq_worker.WorkerSettings
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - upload_tmp:/tmp/onedrive_uploads
    restart: unless-stopped

  worker-vision:
    image: onedrive-cbr-backend-vision:local
    build:
      context: ./src
      dockerfile: backend/Dockerfile
      args:
        UV_SYNC_ARGS: "--extra ai-vision"
    container_name: driver-worker-vision
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      COMIC_RAR_TOOLS_DIR: /app/.tools
      WORKER_QUEUE_NAME: driver:jobs:vision
      WORKER_CONCURRENCY: 1
      WORKER_ENABLE_IMAGE_HANDLERS: "true"
      DB_POOL_SIZE: 4
      DB_MAX_OVERFLOW: 2
    command: uv run --no-sync arq backend.workers.arq_worker.WorkerSettings
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - upload_tmp:/tmp/onedrive_uploads
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: onedrive-cbr-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    container_name: driver-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"
    restart: unless-stopped

volumes:
  upload_tmp:
