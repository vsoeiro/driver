services:
  backend:
    build:
      context: .
      dockerfile: src/backend/Dockerfile
    container_name: onedrive-cbr-backend
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      COMIC_RAR_TOOLS_DIR: /app/.tools
      DB_POOL_SIZE: 6
      DB_MAX_OVERFLOW: 0
    command: >
      sh -c "uv run alembic upgrade head &&
             uv run uvicorn backend.main:app --host 0.0.0.0 --port 8000"
    depends_on:
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    restart: unless-stopped

  worker-light:
    build:
      context: .
      dockerfile: src/backend/Dockerfile
    container_name: onedrive-cbr-worker-light
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      COMIC_RAR_TOOLS_DIR: /app/.tools
      WORKER_QUEUE_NAME: driver:jobs:light
      WORKER_CONCURRENCY: 8
      DB_POOL_SIZE: 3
      DB_MAX_OVERFLOW: 0
    command: uv run arq backend.workers.arq_worker.WorkerSettings
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker-default:
    build:
      context: .
      dockerfile: src/backend/Dockerfile
    container_name: onedrive-cbr-worker-default
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      COMIC_RAR_TOOLS_DIR: /app/.tools
      WORKER_QUEUE_NAME: driver:jobs
      WORKER_CONCURRENCY: 3
      DB_POOL_SIZE: 2
      DB_MAX_OVERFLOW: 0
    command: uv run arq backend.workers.arq_worker.WorkerSettings
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker-heavy:
    build:
      context: .
      dockerfile: src/backend/Dockerfile
    container_name: onedrive-cbr-worker-heavy
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      COMIC_RAR_TOOLS_DIR: /app/.tools
      WORKER_QUEUE_NAME: driver:jobs:heavy
      WORKER_CONCURRENCY: 1
      DB_POOL_SIZE: 1
      DB_MAX_OVERFLOW: 0
    command: uv run arq backend.workers.arq_worker.WorkerSettings
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: onedrive-cbr-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    container_name: onedrive-cbr-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"
    restart: unless-stopped
