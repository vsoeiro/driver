services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: onedrive-cbr-backend
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      COMIC_RAR_TOOLS_DIR: /app/.tools
    command: >
      sh -c "uv run alembic upgrade head &&
             uv run uvicorn backend.main:app --host 0.0.0.0 --port 8000"
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: onedrive-cbr-worker
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      COMIC_RAR_TOOLS_DIR: /app/.tools
    command: uv run arq backend.workers.arq_worker.WorkerSettings
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: onedrive-cbr-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: onedrive-cbr-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"
    restart: unless-stopped
